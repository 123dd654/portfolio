<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gauge Progress Bar</title>
    <style>
        .gauge {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(#8bc0bf 0% 56%, #3d3d3d 56% 100%);
        }

        .gauge::before {
            content: '';
            position: absolute;
            top: 10%;
            left: 10%;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            background: #1a1a1a;
        }

        .gauge::after {
            content: attr(data-value) '%';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #b3b3b3;
        }

        .tick {
            position: absolute;
            width: 10px;
            height: 50px;
            background: #8bc0bf;
            top: 50%;
            left: 50%;
            transform-origin: bottom center;
        }

        .tick:nth-child(1) { transform: rotate(0deg) translate(-50%, -100%); }
        .tick:nth-child(2) { transform: rotate(30deg) translate(-50%, -100%); }
        .tick:nth-child(3) { transform: rotate(60deg) translate(-50%, -100%); }
        .tick:nth-child(4) { transform: rotate(90deg) translate(-50%, -100%); }
        .tick:nth-child(5) { transform: rotate(120deg) translate(-50%, -100%); }
        .tick:nth-child(6) { transform: rotate(150deg) translate(-50%, -100%); }
        .tick:nth-child(7) { transform: rotate(180deg) translate(-50%, -100%); }
        .tick:nth-child(8) { transform: rotate(210deg) translate(-50%, -100%); }
        .tick:nth-child(9) { transform: rotate(240deg) translate(-50%, -100%); }
        .tick:nth-child(10) { transform: rotate(270deg) translate(-50%, -100%); }
        .tick:nth-child(11) { transform: rotate(300deg) translate(-50%, -100%); }
        .tick:nth-child(12) { transform: rotate(330deg) translate(-50%, -100%); }
    </style>
</head>
<body>
    <div class="gauge" data-value="56">
        <div class="tick"></div>
        <div class="tick"></div>
        <div class="tick"></div>
        <div class="tick"></div>
        <div class="tick"></div>
        <div class="tick"></div>
        <div class="tick"></div>
        <div class="tick"></div>
        <div class="tick"></div>
        <div class="tick"></div>
        <div class="tick"></div>
        <div class="tick"></div>
    </div>
</body>
</html>
