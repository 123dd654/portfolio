<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @font-face {
            font-family: 'AstroSpace';
            src: url('/fonts/AstroSpace-eZ2Bg.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Orbitron';
            src: url('/fonts/Orbitron-VariableFont_wght.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0A090F;
            padding: 20px;
        }

        #wrap {
            width: 100%;
            height: 100vh;
            display: flex;
        }

        #header {
            width: 20%;
            height: 100%;
            border-right: 1px solid #fff;
            display: flex;
            /* align-items: center; */
            justify-content: center;
        }

        .profile {
            width: 100%;
            text-align: center;
        }

        #main {
            width: 70%;
            height: 100%;
        }

        #feeds {
            width: 10%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="wrap">
        <div id="header">
            <div class="profile">
                <svg width="300" height="100" viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
                    <line x1="0" y1="5" x2="300" y2="5" stroke="#6D6D6D" stroke-width="1"/>
                    <rect x="0" y="3" width="5" height="4" fill="#D9D9D9"/>
                    <rect x="150" y="3" width="5" height="4" fill="#D9D9D9"/>
                    <rect x="295" y="3" width="5" height="4" fill="#D9D9D9"/>
                    <line x1="2.5" y1="7" x2="2.5" y2="22" stroke="#6D6D6D" stroke-width="1"/>
                    <line x1="297.5" y1="7" x2="297.5" y2="22" stroke="#6D6D6D" stroke-width="1"/>
                    <rect x="0" y="22" width="5" height="3" fill="#D9D9D9"/>
                    <rect x="295" y="22" width="5" height="3" fill="#D9D9D9"/>
                    <text x="150" y="36" text-anchor="middle" fill="#A5AD89" font-size="46" font-family="AstroSpace" dominant-baseline="middle">PORTFOLIO</text>
                    <line x1="0" y1="70" x2="300" y2="70" stroke="#6D6D6D" stroke-width="1"/>
                    <rect x="0" y="68" width="5" height="4" fill="#D9D9D9"/>
                    <rect x="150" y="68" width="5" height="4" fill="#D9D9D9"/>
                    <rect x="295" y="68" width="5" height="4" fill="#D9D9D9"/>
                    <line x1="0" y1="80" x2="300" y2="80" stroke="#6D6D6D" stroke-width="1"/>
                    <rect x="0" y="78" width="5" height="4" fill="#D9D9D9"/>
                    <rect x="150" y="78" width="5" height="4" fill="#D9D9D9"/>
                    <rect x="295" y="78" width="5" height="4" fill="#D9D9D9"/>
                </svg>
                <svg width="500" height="100" xmlns="http://www.w3.org/2000/svg">
                    <!-- 첫 번째 선 -->
                    <line x1="30" y1="30" x2="180" y2="30" stroke="#6D6D6D" stroke-width="1"/>
                    <rect x="0" y="78" width="5" height="4" fill="#D9D9D9"/>
                
                    <!-- 원들 -->
                    <circle cx="50" cy="30" r="3" fill="#ED6A5A"/>
                    <circle cx="74" cy="30" r="3" fill="#C0BC9C"/>
                    <circle cx="98" cy="30" r="3" fill="#488DA3"/>
                    <circle cx="125" cy="30" r="3" fill="#488DA3"/>
                    <circle cx="150" cy="30" r="3" fill="#C0BC9C"/>
                    
                    <!-- 둘레 원 -->
                    <circle cx="98" cy="30" r="7" fill="none" stroke="#FF5336" stroke-width="1"/>
                    <circle cx="150" cy="30" r="7" fill="none" stroke="#488DA3" stroke-width="1"/>
                    
                    <!-- 두 번째 선 -->
                    <line x1="20" y1="70" x2="220" y2="70" stroke="#6D6D6D" stroke-width="1"/>
                
                    <!-- 시간 텍스트 -->
                    <text id="time-text" x="160" y="35" fill="#66A5B6" font-size="30" font-family="Orbitron" font-weight="Reguler">22:00:00</text>
                
                    <!-- 버튼 텍스트 -->
                    <rect x="240" y="50" width="80" height="30" fill="#404040"/>
                    <text x="260" y="70" fill="#A5AD89" font-size="16" font-family="Arial" font-weight="bold">HOLLO!</text>
                    <text x="340" y="70" fill="#A5AD89" font-size="16" font-family="Arial" font-weight="bold">VOICE FEED</text>
                </svg>
                
                
            </div>
        </div>
        <div id="main"></div>
        <div id="feeds"></div>
    </div>
    <script>
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const timeString = `${hours}:${minutes}:${seconds}`;
            document.getElementById('time-text').textContent = timeString;
        }

        setInterval(updateTime, 1000);
        updateTime();  // 초기 호출로 즉시 업데이트
    </script>
</body>
</html>
