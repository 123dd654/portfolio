<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @font-face {
            font-family: 'astro';
            src: url('/fonts/astro.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Orbitron';
            src: url('/fonts/Orbitron-VariableFont_wght.ttf') format('truetype');
        }

        @font-face {
            font-family: 'AstroSpace';
            src: url('/fonts/AstroSpace-eZ2Bg.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0A090F;
            height: 100vh;
            background-size: 20px 20px;
            background-image: 
                repeating-radial-gradient( rgb(72, 72, 72) 0px, black 2px, black 48px);
        }

        #wrap {
            width: 100%;
            height: 100vh;
            display: flex;
        }

        #header {
            width: 360px;
            height: 100%;
            /* border-right: 1px solid #fff; */
            display: flex;
            /* justify-content: center; */
            flex-direction: column;
            align-items: center;
        }

        .titleimg{
            position: relative;
        }

        h1{
            font-size: 32px;
            font-family: 'astro';
            color: #A5AD89;
            position: absolute;
            top: 44px;
            left: 40px;
        }

        .voice{
            display: flex;
            align-items: center;
            position: absolute;
            font-family: 'AstroSpace';
            top: 204px;
            left: 180px;
            p{
                color: #85A097;
                background-color: rgba(53, 70, 71, 0.6);
                font-size: 10px;
                padding:  4px 10px;
            }
            span{
                color: #85A097;
                font-size: 10px;
                margin-left: 6px;
            }
        }

        .profile {
            width: 100%;
            margin-top: 40px;
            text-align: center;
            
            .profile-image {
                margin-top: 14px;
                position: relative;
                z-index: 1;
            }
            
            .profile-image2{
                position: absolute;
                top: 210px;
                left: 40px;
            }
        }

        #main {
            width: 70%;
            height: 100%;
        }

        #feeds {
            width: 10%;
            height: 100%;
        }

        @keyframes blink1 {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        @keyframes blink2 {
            0%, 100% {
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
        }

        .bouncing-circle {
            animation: blink1 2s infinite;
        }

        .bouncing-circle2 {
            animation: blink2 2s infinite;
        }

        #visualizer {
            width: 150px;
            height: 40px;
            margin-bottom: 5px;
            position: absolute;
            top: 260px;
            left: 170px;
        }


        #controls {
            display: flex;
            gap: 5px;
            align-items: center;
            position: absolute;
            top: 290px;
            left: 220px;
        }

        button {
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 3px 6px;
            cursor: pointer;
            font-size: 10px;
            z-index: 1000;
        }

        #repeat {
            font-size: 16px;
            padding: 2px 4px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="wrap">
        <div id="header">
            <div class="profile">
                <img src="./img/profile_line01.svg" alt="#" class="titleimg">
                <h1>PORTFOILO</h1>
                <svg width="400" height="100" xmlns="http://www.w3.org/2000/svg">
                    <style>.c{fill:#D9D9D9}.l{stroke:#6D6D6D;stroke-width:1}</style>
                    <g class="l"><line x1="30" y1="50" x2="170" y2="50"/><line x1="30" y1="70" x2="330" y2="70"/><line x1="31" y1="30" x2="31" y2="90"/><line x1="172" y1="20" x2="172" y2="50"/><line x1="173" y1="20" x2="330" y2="20"/><line x1="173" y1="62" x2="330" y2="62"/><line x1="330" y1="20" x2="330" y2="70"/></g>
                    <g class="c"><rect x="29" y="49" width="3" height="3"/><rect x="29" y="68" width="3" height="3"/><rect x="170" y="49" width="3" height="3"/><rect x="29" y="27" width="3" height="3"/><rect x="30" y="90" width="3" height="3"/><rect x="170" y="18" width="3" height="3"/><rect x="328" y="18" width="3" height="3"/><rect x="170" y="60" width="3" height="3"/><rect x="328" y="60" width="3" height="3"/><rect x="170" y="69" width="3" height="3"/><rect x="328" y="69" width="3" height="3"/></g>
                    <g fill="none" stroke-width="1"><circle cx="98" cy="50" r="7" stroke="#FF5336" class="bouncing-circle"/><circle cx="150" cy="50" r="7" stroke="#488DA3" class="bouncing-circle"/></g>
                    <g><circle cx="50" cy="50" r="3" fill="#ED6A5A" class="bouncing-circle"/><circle cx="74" cy="50" r="3" fill="#C0BC9C" class="bouncing-circle2"/><circle cx="98" cy="50" r="3" fill="#488DA3" class="bouncing-circle"/><circle cx="125" cy="50" r="3" fill="#488DA3" class="bouncing-circle2"/><circle cx="150" cy="50" r="3" fill="#C0BC9C" class="bouncing-circle"/></g>
                    <text id="time-text" x="180" y="50" fill="#66A5B6" font-size="28" font-family="Orbitron">22:00:00</text>
                </svg>
                <div class="voice">
                    <p>HOLLO!</p>
                    <span>VOICE FEED</span>
                </div>
                <img src="./img/profile_line03.svg" alt="#" class="profile-image">
                <img src="./img/profile_img.png" alt="#" class="profile-image2">
                <canvas id="visualizer"></canvas>
                <div id="controls">
                    <button id="playPause">▶</button>
                    <button id="repeat">⟲</button>
                </div>
                <audio id="audioElement" src="space_audio.mp3" style="display: none;"></audio>
            </div>
        </div>
        <div id="main"></div>
        <div id="feeds"></div>
    </div>
    <script>
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const timeString = `${hours}:${minutes}:${seconds}`;
            document.getElementById('time-text').textContent = timeString;
        }

        setInterval(updateTime, 1000);
        updateTime();  // 초기 호출로 즉시 업데이트

        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const playPauseBtn = document.getElementById('playPause');
        const repeatBtn = document.getElementById('repeat');
        const audioElement = document.getElementById('audioElement');

        let audioContext, analyser, source, dataArray, bufferLength;
        let isPlaying = false;

        canvas.width = 500;
        canvas.height = 100;

        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            source = audioContext.createMediaElementSource(audioElement);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
        }

        function drawWaveform() {
            requestAnimationFrame(drawWaveform);

            if (audioContext) {
                analyser.getByteTimeDomainData(dataArray);
            } else {
                // 초기 상태에서는 평평한 선을 그립니다
                for (let i = 0; i < bufferLength; i++) {
                    dataArray[i] = 128;
                }
            }

            ctx.fillStyle = 'rgb(0, 0, 0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.lineWidth = 2;
            ctx.strokeStyle = 'rgb(255, 255, 255)';
            ctx.beginPath();

            const sliceWidth = canvas.width * 1.0 / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * canvas.height / 2;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }

                x += sliceWidth;
            }

            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
        }

        // 초기 상태에서 평평한 선을 그리기 위해 bufferLength와 dataArray를 초기화합니다
        bufferLength = 1024;
        dataArray = new Uint8Array(bufferLength).fill(128);

        drawWaveform();

        playPauseBtn.addEventListener('click', () => {
            if (!audioContext) {
                initAudio();
            }

            if (isPlaying) {
                audioElement.pause();
                playPauseBtn.textContent = '▶';
            } else {
                audioElement.play();
                playPauseBtn.textContent = '❚❚';
            }
            isPlaying = !isPlaying;
        });

        repeatBtn.addEventListener('click', () => {
            audioElement.currentTime = 0;
            if (!isPlaying) {
                audioElement.play();
                playPauseBtn.textContent = '❚❚';
                isPlaying = true;
            }
        });

        audioElement.addEventListener('ended', () => {
            isPlaying = false;
            playPauseBtn.textContent = '▶';
        });
    </script>
</body>
</html>
